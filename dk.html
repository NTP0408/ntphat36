<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title> Đăng kí Câu lạc bộ ngoại khóa Trường Lê Quý Đôn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="register-page">

<div class="register-overlay">

    <form class="register-form">
        <h1>ĐĂNG KÝ Câu lạc bộ ngoại khóa Trường Lê Quý Đôn</h1>
        <p>Trường THPT Lê Quý Đôn</p>

        <label>Họ và tên</label>
        <input type="text" placeholder="Nhập họ và tên" required>

        <label>Lớp</label>
        <input type="text" placeholder="Ví dụ: 10A1" required>

        <label>Tên tài khoản</label>
        <input type="text" placeholder="Tên đăng nhập" required>

        <label>Mật khẩu</label>
        <input type="password" placeholder="Nhập mật khẩu" required>

        <label>Số điện thoại</label>
        <input type="tel" placeholder="0123456789" required>

        <label>Email</label>
        <input type="email" placeholder="example@gmail.com" required>

        <button type="submit">ĐĂNG KÝ</button>

        <a href="index.html" class="back-link">⬅ Quay về trang chủ</a>
    </form>

</div>

</body>
</html>
